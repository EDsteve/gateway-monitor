services:
  gateway-monitor:
    build: .
    image: gateway-monitor:latest
    # `pull_policy: never` stops `docker compose pull` from trying to fetch
    # this image from a registry — it only exists locally, built from the
    # Dockerfile above. Without this, Portainer's "Pull and redeploy" fails
    # with "pull access denied for gateway-monitor".
    pull_policy: never
    container_name: gateway-monitor
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      TTN_API_KEY: ${TTN_API_KEY}
      TTN_REGION: ${TTN_REGION:-au1}
      GATEWAY_IDS: ${GATEWAY_IDS}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-15000}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-eloc-b1e63}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      PORT: ${PORT:-3030}
